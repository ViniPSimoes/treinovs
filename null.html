<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VINI TRAINING</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0F2019; --surface:#162e20; --surface2:#1a3328; --surface3:#1e3d2f;
    --border:#2a4a38; --text:#FBF0EA; --text-muted:#6b9c7d; --text-dim:#2a4a38;
    --gold:#EBB256; --gold-dim:rgba(235,178,86,0.12);
    --green:#5a9e78; --green-dim:rgba(90,158,120,0.12);
    --blue:#4895ef; --purple:#9b5de5; --red:#e05c5c;
    --radius:16px; --radius-sm:10px;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden;padding-bottom:100px;}
  /* HEADER */
  .header{padding:52px 24px 16px;background:linear-gradient(180deg,#0d1f16 0%,transparent 100%);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
  .logo{font-family:'Bebas Neue',cursive;font-size:28px;letter-spacing:3px;color:var(--gold);}
  .logo span{color:var(--text-muted);}
  .streak{display:flex;align-items:center;gap:6px;background:var(--gold-dim);border:1px solid rgba(235,178,86,0.3);padding:6px 12px;border-radius:20px;font-size:13px;font-weight:600;color:var(--gold);}
  .date-label{font-size:13px;color:var(--text-muted);}
  /* WEEK STRIP */
  .week-strip{padding:16px 24px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;}
  .week-strip::-webkit-scrollbar{display:none;}
  .day-chip{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:48px;cursor:pointer;}
  .day-chip-label{font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:1px;}
  .day-chip-num{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;background:var(--surface);border:1px solid var(--border);transition:all 0.2s;position:relative;}
  .day-chip.active .day-chip-num{background:var(--gold);color:#0F2019;border-color:var(--gold);font-weight:700;}
  .day-chip.has-workout .day-chip-num::after{content:'';position:absolute;bottom:4px;width:4px;height:4px;border-radius:50%;background:var(--green);}
  .day-chip.active.has-workout .day-chip-num::after{background:#0F2019;}
  /* LAYOUT */
  .section{padding:0 24px;margin-bottom:28px;}
  .section-title{font-family:'Bebas Neue',cursive;font-size:13px;letter-spacing:3px;color:var(--text-muted);margin-bottom:14px;}
  /* STATS */
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px;padding:0 24px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px 14px;text-align:center;}
  .stat-value{font-family:'Bebas Neue',cursive;font-size:28px;color:var(--gold);line-height:1;}
  .stat-label{font-size:10px;color:var(--text-muted);margin-top:4px;font-family:'DM Mono',monospace;letter-spacing:0.5px;text-transform:uppercase;}
  /* TODAY CARD */
  .today-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:12px;cursor:pointer;transition:all 0.2s;}
  .today-card:active{transform:scale(0.98);}
  .today-card-accent{height:3px;}
  .today-card-body{padding:18px 20px;}
  .today-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .workout-type{display:flex;align-items:center;gap:10px;}
  .workout-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .workout-name{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:1px;line-height:1;}
  .workout-sub{font-size:12px;color:var(--text-muted);margin-top:2px;}
  .workout-badge{font-family:'DM Mono',monospace;font-size:11px;padding:5px 10px;border-radius:8px;font-weight:500;}
  .exercises-preview{display:flex;flex-wrap:wrap;gap:6px;}
  .exercise-tag{font-size:11px;padding:4px 10px;border-radius:6px;background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);}
  .more-tag{font-size:11px;padding:4px 10px;border-radius:6px;background:transparent;color:var(--text-dim);border:1px dashed var(--border);}
  /* TYPE COLORS */
  .type-musculacao{--accent:#EBB256;--accent-bg:rgba(235,178,86,0.1);}
  .type-corrida{--accent:#4895ef;--accent-bg:rgba(72,149,239,0.1);}
  .type-jj{--accent:#9b5de5;--accent-bg:rgba(155,93,229,0.1);}
  .type-futebol{--accent:#52b788;--accent-bg:rgba(82,183,136,0.1);}
  .today-card .today-card-accent{background:var(--accent,var(--gold));}
  .workout-icon{background:var(--accent-bg,var(--gold-dim));}
  .workout-badge{background:var(--accent-bg,var(--gold-dim));color:var(--accent,var(--gold));}
  /* BUTTONS */
  .btn-start{width:100%;padding:16px;border:none;border-radius:var(--radius-sm);font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:3px;cursor:pointer;transition:all 0.2s;margin-top:14px;}
  .btn-start:active{transform:scale(0.97);}
  .btn-primary{background:var(--gold);color:#0F2019;}
  .btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
  .btn-done{background:rgba(82,183,136,0.15);color:#52b788;border:1px solid rgba(82,183,136,0.3);}
  /* WEEK OVERVIEW */
  .week-overview{display:flex;flex-direction:column;gap:8px;}
  .week-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all 0.15s;}
  .week-row.today-row{border-color:rgba(235,178,86,0.4);background:rgba(235,178,86,0.04);}
  .week-row.past-row{opacity:0.5;}
  .wr-day{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);width:28px;text-transform:uppercase;}
  .wr-icons{display:flex;gap:4px;flex:1;flex-wrap:wrap;}
  .wr-badge{font-size:11px;padding:3px 9px;border-radius:6px;}
  .chip-rest{padding:4px 12px;border-radius:6px;font-size:12px;background:var(--surface2);color:var(--text-dim);}
  /* NAV */
  .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(13,31,22,0.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:12px 0 28px;z-index:200;}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px 0;}
  .nav-icon{font-size:22px;}
  .nav-label{font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:0.5px;text-transform:uppercase;transition:color 0.2s;}
  .nav-item.active .nav-label{color:var(--gold);}
  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;display:none;align-items:flex-end;backdrop-filter:blur(4px);}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border-radius:24px 24px 0 0;padding:24px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);}
  @keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;}
  /* EXERCISE ITEMS */
  .exercise-list{display:flex;flex-direction:column;gap:8px;}
  .ex-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 15px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all 0.2s;}
  .ex-item.done{opacity:0.45;background:rgba(82,183,136,0.05);border-color:rgba(82,183,136,0.2);}
  .ex-item.done .ex-name{text-decoration:line-through;}
  .ex-num{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;font-family:'DM Mono',monospace;flex-shrink:0;}
  .ex-info{flex:1;}
  .ex-name{font-weight:600;font-size:14px;margin-bottom:4px;}
  .ex-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
  .ex-tipo{font-size:9px;font-family:'DM Mono',monospace;letter-spacing:1px;padding:2px 7px;border-radius:4px;font-weight:700;}
  .ex-obs{font-size:11px;color:var(--text-muted);}
  .ex-sets{font-family:'Bebas Neue',cursive;font-size:18px;letter-spacing:1px;flex-shrink:0;}
  .ex-check{width:26px;height:26px;border-radius:7px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
  .ex-item.done .ex-check{background:rgba(82,183,136,0.2);border-color:#52b788;color:#52b788;}
  /* PROGRESS */
  .progress-bar{background:var(--surface3);border-radius:4px;height:4px;margin-bottom:20px;overflow:hidden;}
  .progress-fill{height:100%;background:var(--gold);border-radius:4px;transition:width 0.4s ease;}
  /* SUPERSET DIVIDER */
  .superset-divider{display:flex;align-items:center;gap:10px;margin:18px 0 10px;}
  .superset-line{flex:1;height:1px;background:var(--border);}
  .superset-label{font-size:10px;font-family:'DM Mono',monospace;letter-spacing:2px;padding:4px 10px;border-radius:6px;font-weight:700;}
  /* INTERVALS */
  .interval-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;}
  .interval-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);width:20px;}
  .interval-desc{flex:1;font-size:13px;}
  .interval-time{font-family:'DM Mono',monospace;font-size:12px;color:var(--text-muted);}
  /* MISC */
  .view{display:none;} .view.active{display:block;}
  .btn-icon{width:36px;height:36px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;}
  .input-field{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;margin-bottom:10px;}
  .input-field:focus{border-color:var(--gold);}
  .input-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .type-selector{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .type-btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);font-size:13px;cursor:pointer;}
  .type-btn.selected{border-color:var(--gold);background:var(--gold-dim);color:var(--gold);}
  .tabs{display:flex;gap:4px;background:var(--surface2);padding:4px;border-radius:12px;margin-bottom:20px;}
  .tab{flex:1;padding:10px;border-radius:8px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;color:var(--text-muted);}
  .tab.active{background:var(--surface);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.4);}
  .empty-state{text-align:center;padding:48px 24px;color:var(--text-muted);}
  .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border);padding:12px 20px;border-radius:12px;font-size:14px;font-weight:500;z-index:1000;opacity:0;transition:all 0.3s;white-space:nowrap;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .add-fab{position:fixed;bottom:92px;right:24px;width:52px;height:52px;border-radius:16px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;z-index:300;box-shadow:0 4px 20px rgba(235,178,86,0.4);color:#0F2019;font-weight:700;transition:all 0.2s;}
  .add-fab:active{transform:scale(0.92);}
  ::-webkit-scrollbar{width:0;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">VINI <span>TRAINING</span></div>
    <div class="streak">🔥 <span id="streakCount">0</span> dias</div>
  </div>
  <div class="date-label" id="todayLabel"></div>
</div>

<div class="week-strip" id="weekStrip"></div>

<!-- HOME -->
<div class="view active" id="viewHome">
  <div class="stats-row">
    <div class="stat-card"><div class="stat-value" id="statWeek">0</div><div class="stat-label">Semana</div></div>
    <div class="stat-card"><div class="stat-value" id="statTotal">0</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-value" id="statMonth">0</div><div class="stat-label">Mês</div></div>
  </div>
  <div class="section"><div class="section-title">HOJE</div><div id="todayWorkouts"></div></div>
  <div class="section"><div class="section-title">ESTA SEMANA</div><div class="week-overview" id="weekOverview"></div></div>
</div>

<!-- PLAN -->
<div class="view" id="viewPlan">
  <div class="section" style="padding-top:16px">
    <div class="section-title">PLANO DE TREINO</div>
    <div class="tabs" id="planTabs">
      <div class="tab active" onclick="switchPlanTab('musculacao')">💪 Musculação</div>
      <div class="tab" onclick="switchPlanTab('cardio')">🏃 Cardio</div>
    </div>
    <div id="planContent"></div>
  </div>
</div>

<!-- HISTORY -->
<div class="view" id="viewHistory">
  <div class="section" style="padding-top:16px">
    <div class="section-title">HISTÓRICO</div>
    <div id="historyList"></div>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item active" onclick="switchView('Home')"><div class="nav-icon">🏠</div><div class="nav-label">Início</div></div>
  <div class="nav-item" onclick="switchView('Plan')"><div class="nav-icon">📋</div><div class="nav-label">Plano</div></div>
  <div class="nav-item" onclick="switchView('History')"><div class="nav-icon">📈</div><div class="nav-label">Histórico</div></div>
</div>

<div class="add-fab" onclick="openAddWorkout()">+</div>

<!-- WORKOUT MODAL -->
<div class="modal-overlay" id="workoutModal">
  <div class="modal" id="workoutModalContent"></div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div style="font-family:'Bebas Neue',cursive;font-size:26px;letter-spacing:2px">NOVO TREINO</div>
      <div class="btn-icon" onclick="closeAddModal()">✕</div>
    </div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:1px">Tipo</div>
    <div class="type-selector">
      <div class="type-btn selected" data-type="musculacao" onclick="selectType(this)">💪 Musculação</div>
      <div class="type-btn" data-type="corrida" onclick="selectType(this)">🏃 Corrida</div>
      <div class="type-btn" data-type="jj" onclick="selectType(this)">🥋 Jiu-Jitsu</div>
      <div class="type-btn" data-type="futebol" onclick="selectType(this)">⚽ Futebol</div>
      <div class="type-btn" data-type="descanso" onclick="selectType(this)">😴 Descanso</div>
    </div>
    <input class="input-field" id="addName" placeholder="Nome do treino">
    <div class="input-row">
      <input class="input-field" id="addDay" placeholder="Dia da semana" list="daysList">
      <input class="input-field" id="addTime" placeholder="Horário (ex: 08:00)" style="margin-bottom:10px">
    </div>
    <datalist id="daysList">
      <option value="Segunda"><option value="Terça"><option value="Quarta">
      <option value="Quinta"><option value="Sexta"><option value="Sábado"><option value="Domingo">
    </datalist>
    <input class="input-field" id="addNotes" placeholder="Observações (opcional)">
    <button class="btn-start btn-primary" onclick="saveNewWorkout()">SALVAR TREINO</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

const TC = {
  musculacao:{color:'#EBB256',bg:'rgba(235,178,86,0.1)',label:'Musculação'},
  corrida:{color:'#4895ef',bg:'rgba(72,149,239,0.1)',label:'Corrida'},
  jj:{color:'#9b5de5',bg:'rgba(155,93,229,0.1)',label:'Jiu-Jitsu'},
  futebol:{color:'#52b788',bg:'rgba(82,183,136,0.1)',label:'Futebol'},
  descanso:{color:'#6b6b6b',bg:'rgba(107,107,107,0.1)',label:'Descanso'},
};

// get all exercises flat (handles both .exercicios and .grupos)
function getAllExs(w){
  if(w.exercicios) return w.exercicios;
  if(w.grupos) return w.grupos.flatMap(g=>g.exercicios);
  return [];
}

let S={
  schedule:[...SCHEDULE],
  completed:JSON.parse(localStorage.getItem('vt3_completed')||'{}'),
  history:JSON.parse(localStorage.getItem('vt3_history')||'[]'),
  streak:parseInt(localStorage.getItem('vt3_streak')||'0'),
  selDay:new Date().getDay(),
  addType:'musculacao',
  progress:JSON.parse(localStorage.getItem('vt3_progress')||'{}'),
};

function save(){
  localStorage.setItem('vt3_completed',JSON.stringify(S.completed));
  localStorage.setItem('vt3_history',JSON.stringify(S.history));
  localStorage.setItem('vt3_streak',S.streak.toString());
  localStorage.setItem('vt3_progress',JSON.stringify(S.progress));
}

function init(){
  const now=new Date();
  const days=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const months=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  document.getElementById('todayLabel').textContent=`${days[now.getDay()]}, ${now.getDate()} de ${months[now.getMonth()]}`;
  document.getElementById('streakCount').textContent=S.streak;
  renderStrip();renderHome();
}

function renderStrip(){
  const strip=document.getElementById('weekStrip');
  const today=new Date(),tDow=today.getDay();
  strip.innerHTML='';
  for(let i=0;i<7;i++){
    const d=new Date(today);d.setDate(today.getDate()-tDow+i);
    const dow=d.getDay(),hasW=S.schedule.some(w=>w.day===dow);
    const chip=document.createElement('div');
    chip.className=`day-chip${dow===S.selDay?' active':''}${hasW?' has-workout':''}`;
    chip.innerHTML=`<div class="day-chip-label">${WD[dow]}</div><div class="day-chip-num">${d.getDate()}</div>`;
    chip.onclick=()=>{S.selDay=dow;renderStrip();renderHome();};
    strip.appendChild(chip);
  }
  const a=strip.querySelector('.active');
  if(a)a.scrollIntoView({inline:'center',behavior:'smooth'});
}

function renderHome(){
  const now=new Date();
  const wS=new Date(now);wS.setDate(now.getDate()-now.getDay());wS.setHours(0,0,0,0);
  const mS=new Date(now.getFullYear(),now.getMonth(),1);
  document.getElementById('statWeek').textContent=S.history.filter(h=>new Date(h.date)>=wS).length;
  document.getElementById('statTotal').textContent=S.history.length;
  document.getElementById('statMonth').textContent=S.history.filter(h=>new Date(h.date)>=mS).length;
  renderToday();renderWeekOv();
}

function renderToday(){
  const c=document.getElementById('todayWorkouts');
  const ws=S.schedule.filter(w=>w.day===S.selDay);
  const isToday=S.selDay===new Date().getDay();
  if(!ws.length){
    c.innerHTML=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;text-align:center"><div style="font-size:36px;margin-bottom:10px">😴</div><div style="font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:2px;margin-bottom:6px">DIA DE DESCANSO</div><div style="font-size:13px;color:var(--text-muted)">Recuperação é parte do treino.</div></div>`;
    return;
  }
  c.innerHTML=ws.map(w=>{
    const dk=new Date().toDateString(),done=S.completed[`${dk}-${w.id}`];
    const allEx=getAllExs(w);
    const prev=allEx.slice(0,3).map(e=>`<span class="exercise-tag">${e.nome||e.name}</span>`).join('');
    const more=allEx.length-3;
    const pl=w.period==='manhã'?'🌅 MANHÃ':w.period==='noite'?'🌙 NOITE':'☀️ TARDE';
    return `<div class="today-card type-${w.type}" onclick="openW('${w.id}')">
      <div class="today-card-accent"></div>
      <div class="today-card-body">
        <div class="today-card-header">
          <div class="workout-type">
            <div class="workout-icon">${w.icon}</div>
            <div><div class="workout-name">${w.name}</div><div class="workout-sub">${w.sub}</div></div>
          </div>
          <div class="workout-badge">${pl}</div>
        </div>
        ${allEx.length?`<div class="exercises-preview">${prev}${more>0?`<span class="more-tag">+${more}</span>`:''}</div>`:''}
        ${w.tempo?`<div style="font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;margin-top:8px;display:flex;gap:10px"><span>⏱ ${w.tempo}</span></div>`:''}
        ${w.type==='corrida'&&w.running?`<div style="font-size:12px;color:#4895ef;font-family:'DM Mono',monospace;margin-top:6px">⏱ ${w.running.duration} · ${w.running.intensity}</div>`:''}
        ${isToday?`<button class="btn-start ${done?'btn-done':'btn-primary'}" onclick="event.stopPropagation();${done?'':` openW('${w.id}')`}">${done?'✓ CONCLUÍDO':'INICIAR TREINO'}</button>`:''}
      </div>
    </div>`;
  }).join('');
}

function renderWeekOv(){
  const c=document.getElementById('weekOverview'),tod=new Date().getDay();
  c.innerHTML=[0,1,2,3,4,5,6].map(dow=>{
    const ws=S.schedule.filter(w=>w.day===dow),isT=dow===tod,isPast=dow<tod;
    if(!ws.length)return `<div class="week-row${isT?' today-row':''}" onclick="S.selDay=${dow};renderStrip();renderHome()"><div class="wr-day">${WD[dow]}</div><div class="wr-icons"><span class="chip-rest">Descanso</span></div>${isT?'<div style="font-size:11px;color:var(--gold);font-family:\'DM Mono\',monospace">HOJE</div>':''}</div>`;
    const badges=ws.map(w=>`<span class="wr-badge" style="background:${TC[w.type].bg};color:${TC[w.type].color}">${w.icon} ${w.name}</span>`).join('');
    return `<div class="week-row${isT?' today-row':''}${isPast?' past-row':''}" onclick="S.selDay=${dow};renderStrip();renderHome()"><div class="wr-day">${WD[dow]}</div><div class="wr-icons">${badges}</div>${isT?'<div style="font-size:11px;color:var(--gold);font-family:\'DM Mono\',monospace">HOJE</div>':''}</div>`;
  }).join('');
}

// ── WORKOUT MODAL ────────────────────────────
function openW(id){
  const w=S.schedule.find(x=>x.id===id);if(!w)return;
  const cfg=TC[w.type],dk=new Date().toDateString(),done=S.completed[`${dk}-${id}`];
  const prog=S.progress[id]||{};
  const allEx=getAllExs(w);
  const cc=Object.keys(prog).filter(k=>prog[k]).length,tot=allEx.length,pct=tot?(cc/tot*100):0;

  let html=`<div class="modal-handle"></div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
    <div style="display:flex;align-items:center;gap:12px">
      <div style="width:44px;height:44px;border-radius:12px;background:${cfg.bg};display:flex;align-items:center;justify-content:center;font-size:22px">${w.icon}</div>
      <div>
        <div style="font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:1px;color:${w.cor||cfg.color};line-height:1">${w.name}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${w.sub}</div>
      </div>
    </div>
    <div class="btn-icon" onclick="closeW()">✕</div>
  </div>`;

  if(w.notes) html+=`<div style="font-size:12px;color:var(--text-muted);margin:14px 0;padding:10px 14px;background:var(--surface2);border-radius:8px;font-family:'DM Mono',monospace;line-height:1.5">📝 ${w.notes}</div>`;
  else html+=`<div style="margin-top:16px"></div>`;

  // MUSCULAÇÃO com exercicios simples
  if(w.exercicios&&w.exercicios.length){
    html+=renderProgressBar(cc,tot,pct);
    html+=`<div class="exercise-list">${w.exercicios.map((ex,i)=>renderExItem(ex,i,id,prog,w.cor||cfg.color)).join('')}</div>`;
    html+=renderCompleteBtn(done,id);
  }
  // MUSCULAÇÃO com grupos (sábado)
  else if(w.grupos){
    html+=renderProgressBar(cc,tot,pct);
    let globalIdx=0;
    w.grupos.forEach(g=>{
      html+=`<div class="superset-divider">
        <div class="superset-line" style="background:${g.labelColor||'#EBB256'}30"></div>
        <div class="superset-label" style="background:${g.labelColor||'#EBB256'}15;color:${g.labelColor||'#EBB256'}">${g.label}</div>
        <div class="superset-line" style="background:${g.labelColor||'#EBB256'}30"></div>
      </div><div class="exercise-list">`;
      g.exercicios.forEach(ex=>{
        html+=renderExItem(ex,globalIdx,id,prog,w.cor||cfg.color);
        globalIdx++;
      });
      html+=`</div>`;
    });
    html+=renderCompleteBtn(done,id);
  }
  // CORRIDA
  else if(w.type==='corrida'&&w.running){
    const r=w.running;
    html+=`<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:20px;margin-bottom:16px">
      <div style="font-family:'Bebas Neue',cursive;font-size:42px;color:#4895ef;line-height:1">${r.duration}</div>
      <div style="font-size:12px;color:var(--text-muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:1px;margin-top:4px">Intensidade: ${r.intensity}</div>
    </div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:10px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:1px">PROTOCOLO</div>
    ${r.protocol.map(p=>`<div class="interval-item"><div class="interval-num">${p.n}.</div><div class="interval-desc">${p.desc}</div><div class="interval-time">${p.time}</div></div>`).join('')}`;
    html+=renderCompleteBtn(done,id);
  }
  // DEFAULT (JJ, futebol)
  else html+=renderCompleteBtn(done,id);

  document.getElementById('workoutModalContent').innerHTML=html;
  document.getElementById('workoutModal').classList.add('open');
}

function renderProgressBar(cc,tot,pct){
  if(!tot)return'';
  return `<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);margin-bottom:8px;font-family:'DM Mono',monospace"><span>PROGRESSO</span><span>${cc}/${tot}</span></div>
  <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;
}

function renderExItem(ex,idx,wid,prog,accentColor){
  const d=prog[idx]||false;
  const tc=TIPO_COLOR[ex.tipo]||accentColor;
  return `<div class="ex-item${d?' done':''}" onclick="toggleEx('${wid}',${idx})">
    <div class="ex-num" style="background:${accentColor}20;border:1px solid ${accentColor}40;color:${accentColor}">${ex.num}</div>
    <div class="ex-info">
      <div class="ex-name">${ex.nome}</div>
      <div class="ex-meta">
        <span class="ex-tipo" style="color:${tc};background:${tc}18">${ex.tipo}</span>
        <span class="ex-obs">${ex.obs}</span>
      </div>
    </div>
    <div class="ex-sets" style="color:${accentColor}">${ex.series}×${ex.reps}</div>
    <div class="ex-check">${d?'✓':''}</div>
  </div>`;
}

function renderCompleteBtn(done,id){
  return `<button class="btn-start ${done?'btn-done':'btn-primary'}" style="margin-top:20px" onclick="completeW('${id}')">${done?'✓ CONCLUÍDO':'MARCAR COMO FEITO'}</button>
  <button class="btn-start btn-secondary" style="margin-top:8px" onclick="closeW()">FECHAR</button>`;
}

function toggleEx(wid,idx){
  if(!S.progress[wid])S.progress[wid]={};
  S.progress[wid][idx]=!S.progress[wid][idx];
  save();openW(wid);
}

function closeW(){document.getElementById('workoutModal').classList.remove('open');renderHome();}

function completeW(id){
  const dk=new Date().toDateString(),k=`${dk}-${id}`;
  const w=S.schedule.find(x=>x.id===id);
  if(!S.completed[k]){
    S.completed[k]=true;
    S.history.unshift({id,date:new Date().toISOString(),name:w.name,type:w.type,icon:w.icon});
    S.streak++;document.getElementById('streakCount').textContent=S.streak;
    save();showToast(`✓ ${w.name} concluído!`);
  }
  closeW();
}

// ── PLAN ────────────────────────────────────
let planTab='musculacao';
function switchPlanTab(t){
  planTab=t;
  document.querySelectorAll('#planTabs .tab').forEach((el,i)=>el.classList.toggle('active',(i===0&&t==='musculacao')||(i===1&&t==='cardio')));
  renderPlan();
}

  const c=document.getElementById('planContent');
  if(planTab==='musculacao'){
    const musW=S.schedule.filter(w=>w.type==='musculacao');

            <div style="flex:1;height:1px;background:${g.labelColor||accentColor}25"></div>${g.label}<div style="flex:1;height:1px;background:${g.labelColor||accentColor}25"></div>
          </div>`;

        });

        <div style="padding:18px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">

              <div style="font-size:22px">${w.icon}</div>
              <div>
                <div style="font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:1px;color:${accentColor}">${w.name}</div>
                <div style="font-size:12px;color:var(--text-muted)">${WDF[w.day]} · ${w.period}</div>
              </div>
            </div>
            <div style="background:${accentColor}15;border:1px solid ${accentColor}35;border-radius:8px;padding:6px 10px;text-align:center">

            </div>
          </div>
          ${w.notes?`<div style="font-size:11px;color:var(--text-muted);margin:10px 0;padding:8px 12px;background:var(--surface2);border-radius:7px;font-family:'DM Mono',monospace">${w.notes}</div>`:''}
          <div style="margin-top:12px">${exHtml}</div>
        </div>
      </div>`;
    }).join('');
  } else {
    const all=S.schedule.filter(w=>w.type==='corrida'||w.type==='futebol');
    c.innerHTML=`<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px">
      <div style="font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">RESUMO SEMANAL</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <div style="padding:8px 14px;border-radius:8px;background:rgba(72,149,239,0.1);color:#4895ef;font-size:13px">🏃 2x leve</div>
        <div style="padding:8px 14px;border-radius:8px;background:rgba(224,92,92,0.1);color:#e05c5c;font-size:13px">⚡ 1x forte</div>
        <div style="padding:8px 14px;border-radius:8px;background:rgba(82,183,136,0.1);color:#52b788;font-size:13px">⚽ 2x futebol</div>
      </div>

    ${all.map(w=>{const cfg=TC[w.type];return`
      <div style="background:var(--surface);border:1px solid var(--border);border-left:3px solid ${cfg.color};border-radius:var(--radius);overflow:hidden;margin-bottom:10px;cursor:pointer" onclick="openW('${w.id}')">

              <div style="font-size:12px;color:var(--text-muted)">${WDF[w.day]} · ${w.notes||w.sub}</div>
            </div>
          </div>
          ${w.running?w.running.protocol.map(p=>`<div style="display:flex;gap:10px;align-items:center;padding:8px 12px;background:var(--surface2);border-radius:7px;margin-bottom:5px">

function renderPlanEx(ex,i,accentColor){
  const tc=TIPO_COLOR[ex.tipo]||accentColor;
  return `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:8px;margin-bottom:5px">
    <div style="width:28px;height:28px;border-radius:6px;background:${accentColor}20;border:1px solid ${accentColor}40;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;font-family:'DM Mono',monospace;color:${accentColor};flex-shrink:0">${ex.num}</div>
    <div style="flex:1">
      <div style="font-size:14px;font-weight:500;margin-bottom:3px">${ex.nome}</div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        <span style="font-size:9px;font-family:'DM Mono',monospace;letter-spacing:1px;color:${tc};background:${tc}18;padding:2px 6px;border-radius:4px;font-weight:700">${ex.tipo}</span>
        <span style="font-size:11px;color:var(--text-muted)">${ex.obs}</span>
      </div>
    </div>
    <div style="font-family:'Bebas Neue',cursive;font-size:16px;color:${accentColor};flex-shrink:0">${ex.series}×${ex.reps}</div>
  </div>`;
}

// ── HISTORY ──────────────────────────────────
function renderHistory(){
  const c=document.getElementById('historyList');
  if(!S.history.length){c.innerHTML=`<div class="empty-state"><div style="font-size:48px;margin-bottom:12px">📭</div><div style="font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:2px;margin-bottom:8px">SEM HISTÓRICO</div><div style="font-size:14px;line-height:1.6">Comece seu primeiro treino hoje.</div></div>`;return;}
  c.innerHTML=S.history.slice(0,30).map(h=>{
    const d=new Date(h.date),cfg=TC[h.type];
    return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-bottom:8px">
      <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">${d.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'short'})}</div>
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:36px;height:36px;border-radius:10px;background:${cfg.bg};display:flex;align-items:center;justify-content:center;font-size:18px">${h.icon}</div>
        <div><div style="font-weight:600;font-size:16px">${h.name}</div><div style="font-size:12px;color:${cfg.color}">${cfg.label}</div></div>
      </div>
    </div>`;
  }).join('');
}

// ── NAV ──────────────────────────────────────
function switchView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById(`view${name}`).classList.add('active');
  document.querySelectorAll('.nav-item')[['Home','Plan','History'].indexOf(name)].classList.add('active');
  if(name==='Plan')renderPlan();
  if(name==='History')renderHistory();
  document.querySelector('.add-fab').style.display=name==='History'?'none':'flex';
}

function openAddWorkout(){document.getElementById('addModal').classList.add('open');}
function closeAddModal(){document.getElementById('addModal').classList.remove('open');}
function selectType(el){document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('selected'));el.classList.add('selected');S.addType=el.dataset.type;}
function saveNewWorkout(){
  const name=document.getElementById('addName').value.trim();
  const day=document.getElementById('addDay').value.trim();
  const time=document.getElementById('addTime').value.trim();
  const notes=document.getElementById('addNotes').value.trim();
  if(!name||!day){showToast('⚠️ Preencha nome e dia');return;}
  const di=WDF.findIndex(d=>d.toLowerCase()===day.toLowerCase());
  if(di===-1){showToast('⚠️ Dia inválido');return;}
  const icons={musculacao:'💪',corrida:'🏃',jj:'🥋',futebol:'⚽',descanso:'😴'};
  S.schedule.push({id:`c-${Date.now()}`,day:di,period:'manhã',type:S.addType,name,sub:notes||TC[S.addType].label,icon:icons[S.addType],notes:time?`⏰ ${time}${notes?' · '+notes:''}`:notes,exercises:[]});
  closeAddModal();renderHome();showToast(`✓ ${name} adicionado!`);
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

document.getElementById('workoutModal').addEventListener('click',function(e){if(e.target===this)closeW();});
document.getElementById('addModal').addEventListener('click',function(e){if(e.target===this)closeAddModal();});

init();
</script>
</body>
</html>
